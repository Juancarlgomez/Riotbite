<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="js/scripts.js" defer></script>
    <link rel="stylesheet" href="css/styles.css">
    <title>Contact - Riot Bite Candy</title>
</head>

<body>
    <nav class="navbar">
        <ul class="logo">
            <!-- Make this a logo in the future -->
            <li> Riot Bite </li>
        </ul>

        <button class="menu-toggle" aria-label="Toggle menu" aria-expanded="false" aria-controls="nav-links">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <ul class="nav-links" id="nav-links">
            <li><a href="/" class="nav-link">Home</a></li>
            <li><a href="products.html" class="nav-link">Products</a></li>
            <li><a href="about.html" class="nav-link">About</a></li>
            <li><a href="contact.html" class="nav-link">Contact</a></li>
        </ul>
    </nav>
    <main class="contact">
        <h1 class="centered">Contact Us</h1>
        <p class="centered">We'd want to hear from you! contact us bellow</p>

        <form class="contact-form">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="subject">Subject:</label>
            <select id="subject" name="subject" required>
                <option value="">--Please choose an option--</option>
                <option value="general">General Inquiry</option>
                <option value="product">Product Feedback</option>
                <option value="support">Customer Support</option>
                <option value="other">Other</option>
            </select>

            <label for="message">Message:</label>
            <textarea id="message" name="message" required></textarea>

            <div class="row-right">
                <button type="submit">Submit</button>
                <button type="reset">Reset</button>
            </div>
        </form>
    </main>
    <footer>
        <p>&copy; 2026 Riot Bite Candy. All rights reserved. All products are for entertainment purposes only.</p>
    </footer>

</body>

</html>
